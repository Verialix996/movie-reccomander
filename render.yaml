services:
  - type: web
    name: movies-chatbot
    env: python
    buildCommand: pip install -r requirements.txt && (test -f data/movies.csv || python data_prep.py)
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
